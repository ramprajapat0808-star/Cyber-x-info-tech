<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - CYBER X ACADEMY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: { 50: '#FEFDFB', 100: '#FDFCF8', 200: '#F5F0E8', 300: '#E8E0D2' },
            beige: { 400: '#C9B99A', 500: '#B5A282', 600: '#9E8A66' },
            dark: { 800: '#2A2520', 900: '#1C1917' }
          },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #FDFCF8; color: #2A2520; }
    .profile-radius { border-radius: 10px; }
    .card-hover { transition: transform 400ms ease, box-shadow 400ms ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0,0,0,0.06); }
    ::selection { background: rgba(197,185,154,0.3); color: #2A2520; }
  

/* Premium Cyber Theme - edited by ChatGPT */
:root{
  --cx-bg:#050814;
  --cx-panel:#0b1630;
  --cx-panel-2:#101f42;
  --cx-cyan:#35d7ff;
  --cx-blue:#246bff;
  --cx-purple:#8d5cff;
  --cx-gold:#ffc53d;
  --cx-orange:#ff7a18;
  --cx-text:#eef7ff;
  --cx-muted:rgba(238,247,255,.68);
}
html{scroll-behavior:smooth;}
body{
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
  background:
    radial-gradient(circle at 16% 12%, rgba(36,107,255,.35), transparent 28%),
    radial-gradient(circle at 82% 8%, rgba(255,122,24,.22), transparent 24%),
    radial-gradient(circle at 50% 95%, rgba(53,215,255,.18), transparent 30%),
    linear-gradient(135deg,#050814 0%,#07142d 42%,#0d1022 100%) !important;
  color:var(--cx-text) !important;
  min-height:100vh;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  background-image:
    linear-gradient(rgba(53,215,255,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(53,215,255,.07) 1px, transparent 1px);
  background-size:34px 34px;
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.75), rgba(0,0,0,.18));
}
nav{
  background:rgba(5,12,30,.82) !important;
  border-bottom:1px solid rgba(53,215,255,.22) !important;
  box-shadow:0 10px 35px rgba(0,0,0,.35);
}
nav a:first-child{
  color:var(--cx-gold) !important;
  letter-spacing:.08em;
  text-shadow:0 0 16px rgba(255,197,61,.45);
}
a:hover{color:var(--cx-cyan) !important;}
[class*="text-dark-800"]{color:var(--cx-text) !important;}
[class*="text-dark-800/"]{color:var(--cx-muted) !important;}
[class*="text-beige"], .nav-active{color:var(--cx-gold) !important;}
[class*="text-cream"]{color:var(--cx-text) !important;}
[class*="bg-white"], [class*="bg-cream-100"], [class*="bg-cream-200"]{
  background:linear-gradient(145deg, rgba(16,31,66,.86), rgba(7,17,40,.72)) !important;
  border:1px solid rgba(53,215,255,.20) !important;
  box-shadow:0 18px 50px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.06);
  backdrop-filter:blur(14px);
}
[class*="bg-dark-800"], [class*="bg-dark-900"]{
  background:linear-gradient(135deg, var(--cx-orange), var(--cx-gold)) !important;
  color:#07142d !important;
  box-shadow:0 10px 28px rgba(255,122,24,.28), 0 0 0 1px rgba(255,255,255,.08) inset;
}
[class*="bg-beige-400"]{
  background:linear-gradient(135deg, var(--cx-cyan), var(--cx-blue)) !important;
  color:#fff !important;
}
.profile-radius{border-radius:18px !important;}
.card-hover{
  position:relative;
  overflow:hidden;
  transition:transform .35s ease, box-shadow .35s ease, border-color .35s ease !important;
}
.card-hover::after{
  content:"";
  position:absolute;
  inset:-1px;
  pointer-events:none;
  background:linear-gradient(120deg, transparent 0%, rgba(53,215,255,.18) 35%, rgba(255,197,61,.14) 50%, transparent 70%);
  opacity:.0;
  transition:opacity .35s ease;
}
.card-hover:hover{
  transform:translateY(-7px) scale(1.01) !important;
  border-color:rgba(53,215,255,.48) !important;
  box-shadow:0 24px 70px rgba(0,0,0,.48), 0 0 35px rgba(53,215,255,.14) !important;
}
.card-hover:hover::after{opacity:1;}
h1,h2,h3,.font-display{
  color:var(--cx-text) !important;
  text-shadow:0 0 22px rgba(53,215,255,.16);
}
h1 span, h2 span{color:var(--cx-gold) !important;}
p, span, label, td, th{color:inherit;}
.iconify{filter:drop-shadow(0 0 10px rgba(53,215,255,.45));}
input,select,textarea{
  background:rgba(4,10,24,.70) !important;
  border:1px solid rgba(53,215,255,.24) !important;
  color:var(--cx-text) !important;
}
input::placeholder, textarea::placeholder{color:rgba(238,247,255,.45) !important;}
footer{
  background:rgba(5,12,30,.92) !important;
  border-top:1px solid rgba(53,215,255,.18);
}
.modal-overlay,.modal-bg{background:rgba(2,6,16,.72) !important;backdrop-filter:blur(12px) !important;}
::selection{background:rgba(255,197,61,.35) !important;color:#fff !important;}

  </style>
</head>
<body class="antialiased">

  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 h-16 flex items-center px-6" style="background:rgba(253,252,248,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(197,185,154,0.2);">
    <div class="max-w-5xl mx-auto w-full flex items-center justify-between">
      <a href="index.html" class="font-display text-xl text-dark-800 tracking-wide">Cyber X</a>
      <div class="hidden md:flex items-center gap-6">
        <a href="index.html" class="text-xs font-medium uppercase tracking-[0.15em] text-dark-800/60 hover:text-beige-600 transition-colors">Home</a>
        <a href="courses.html" class="text-xs font-medium uppercase tracking-[0.15em] text-dark-800/60 hover:text-beige-600 transition-colors">Courses</a>
        <a href="admin.html" class="text-xs font-medium uppercase tracking-[0.15em] text-beige-600">Admin</a>
        <a href="contact.html" class="text-xs font-medium uppercase tracking-[0.15em] text-dark-800/60 hover:text-beige-600 transition-colors">Contact</a>
      </div>
    </div>
  </nav>

  <section class="pt-28 pb-16 px-6">
    <div class="max-w-4xl mx-auto">
      <div class="text-center mb-10">
        <p class="text-beige-600 text-[10px] font-bold uppercase tracking-[0.25em] mb-2">Restricted</p>
        <h2 class="font-display text-3xl md:text-4xl font-medium text-dark-800 tracking-tight">Admin Panel</h2>
      </div>

      <!-- Login Gate -->
      <div id="adminGate" class="profile-radius bg-white border border-beige-400/20 p-8 max-w-md mx-auto text-center shadow-lg">
        <div class="w-14 h-14 bg-cream-200 profile-radius flex items-center justify-center mx-auto mb-6">
          <span class="iconify w-6 h-6 text-beige-600" data-icon="lucide:lock"></span>
        </div>
        <h3 class="font-display text-xl text-dark-800 mb-2">Authentication</h3>
        <p class="text-dark-800/40 text-sm font-light mb-6">Enter admin password to continue</p>
        <input type="password" id="adminPassword" placeholder="Password" class="w-full bg-cream-50 border border-beige-400/20 profile-radius px-4 py-3 text-sm text-center focus:outline-none focus:border-beige-600 transition-colors mb-4">
        <button onclick="checkPass()" class="w-full py-3 bg-dark-800 text-cream-100 text-xs font-bold uppercase tracking-wider profile-radius hover:bg-dark-900 transition-colors">Unlock</button>
      </div>

      <!-- Dashboard -->
      <div id="adminDash" class="hidden">
        <div class="flex justify-end mb-6">
          <button onclick="logOut()" class="text-xs uppercase tracking-wider text-red-500 border border-red-500/30 px-4 py-2 profile-radius hover:bg-red-50 transition-colors flex items-center gap-2">
            <span class="iconify w-4 h-4" data-icon="lucide:log-out"></span> Logout
          </button>
        </div>

        <!-- Add Student -->
        <div class="profile-radius bg-white border border-beige-400/20 p-8 shadow-lg mb-8">
          <h3 class="font-display text-xl text-dark-800 mb-6 flex items-center gap-3">
            <span class="iconify w-5 h-5 text-beige-600" data-icon="lucide:user-plus"></span> Add Student
          </h3>
          <form id="addForm" class="grid md:grid-cols-2 gap-6">
            <input type="text" id="sName" required placeholder="Student Name" class="bg-cream-50 border border-beige-400/20 profile-radius px-4 py-2.5 text-sm focus:outline-none focus:border-beige-600 transition-colors">
            <input type="tel" id="sPhone" required placeholder="Phone Number" class="bg-cream-50 border border-beige-400/20 profile-radius px-4 py-2.5 text-sm focus:outline-none focus:border-beige-600 transition-colors">
            <select id="sCourse" required class="bg-cream-50 border border-beige-400/20 profile-radius px-4 py-2.5 text-sm focus:outline-none focus:border-beige-600 transition-colors">
              <option value="" disabled selected>Select Course</option>
              <option value="AI Development">AI Development</option>
              <option value="Web Development">Web Development</option>
              <option value="App Development">App Development</option>
              <option value="RS-CIT + MS Office">RS-CIT + MS Office</option>
              <option value="Tally Prime">Tally Prime</option>
              <option value="Basic Computer">Basic Computer</option>
              <option value="Advanced Excel">Advanced Excel</option>
            </select>
            <button type="submit" class="py-2.5 bg-dark-800 text-cream-100 text-xs font-bold uppercase tracking-wider profile-radius hover:bg-dark-900 transition-colors">Add</button>
          </form>
        </div>

        <!-- Search Student -->
        <div class="profile-radius bg-white border border-beige-400/20 p-8 shadow-lg">
          <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-6">
            <h3 class="font-display text-xl text-dark-800 flex items-center gap-3">
              <span class="iconify w-5 h-5 text-beige-600" data-icon="lucide:users"></span> Records
            </h3>
            <input type="text" id="searchInput" placeholder="Search by name..." class="w-full md:w-64 bg-cream-50 border border-beige-400/20 profile-radius px-4 py-2 text-sm focus:outline-none focus:border-beige-600 transition-colors">
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead>
                <tr class="border-b border-beige-400/20 text-[10px] uppercase tracking-widest text-dark-800/40">
                  <th class="py-3 px-4">Name</th>
                  <th class="py-3 px-4 hidden md:table-cell">Phone</th>
                  <th class="py-3 px-4">Course</th>
                  <th class="py-3 px-4 hidden md:table-cell">Date</th>
                </tr>
              </thead>
              <tbody id="tbody" class="text-sm text-dark-800/70"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const PASS = 'cyberx@2025';

    function checkPass() {
      if(document.getElementById('adminPassword').value === PASS) {
        document.getElementById('adminGate').classList.add('hidden');
        document.getElementById('adminDash').classList.remove('hidden');
        fetchStudents();
      } else {
        alert('Wrong Password!');
      }
    }

    function logOut() {
      document.getElementById('adminGate').classList.remove('hidden');
      document.getElementById('adminDash').classList.add('hidden');
      document.getElementById('adminPassword').value = '';
    }

    async function fetchStudents(q='') {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-dark-800/30">Loading...</td></tr>';
      let query = db.from('students').select('*').order('created_at', { ascending: false });
      if(q) query = query.ilike('name', `%${q}%`);
      const { data, error } = await query;
      if(error) { tbody.innerHTML = `<tr><td colspan="4" class="text-red-500 text-center py-4">${error.message}</td></tr>`; return; }
      if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-dark-800/30">No records</td></tr>'; return; }
      tbody.innerHTML = '';
      data.forEach(s => {
        const d = new Date(s.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
        tbody.innerHTML += `<tr class="border-b border-beige-400/10 hover:bg-cream-200/30 transition-colors">
          <td class="py-3 px-4 font-medium text-dark-800">${s.name}</td>
          <td class="py-3 px-4 hidden md:table-cell">${s.phone}</td>
          <td class="py-3 px-4"><span class="px-2 py-1 bg-cream-200 text-dark-800 text-[10px] font-medium uppercase tracking-wider profile-radius">${s.course}</span></td>
          <td class="py-3 px-4 hidden md:table-cell text-dark-800/40">${d}</td>
        </tr>`;
      });
    }

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('sName').value.trim();
      const phone = document.getElementById('sPhone').value.trim();
      const course = document.getElementById('sCourse').value;
      const { error } = await db.from('students').insert([{ name, phone, course }]);
      if(error) alert(error.message);
      else { alert('Student Added!'); document.getElementById('addForm').reset(); fetchStudents(); }
    });

    let t;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(t);
      t = setTimeout(() => fetchStudents(e.target.value), 500);
    });
  </script>
</body>
</html>
